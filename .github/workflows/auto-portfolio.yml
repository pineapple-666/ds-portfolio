name: Auto Portfolio Update

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  run-my-robot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy matplotlib seaborn scikit-learn statsmodels xgboost kaggle

      - name: Run portfolio analysis script
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          python scripts/generate_portfolio.py

      - name: Configure git and commit to master
        run: |
          git config --global user.name "Alysa Bot"
          git config --global user.email "alysa@openclaw.local"
          git checkout -B master
          git add -A
          git commit -m "Auto: Generate portfolio project-1 analysis" || echo "No changes to commit"
          git push -u origin master --force

      - name: Create PR from master to main
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Check if PR already exists
          if ! gh pr list --base main --head master --state open | grep -q .; then
            gh pr create \
              --title "Portfolio Project-1: E-commerce/Finance Analysis" \
              --body "## Auto-Generated Portfolio Analysis

### Methods Used
- Statistical Analysis: Descriptive stats, correlation analysis, feature distribution
- GLM: Logistic/Linear Regression with coefficient interpretation
- ML Models: Random Forest, XGBoost with feature importance

### Business Problems Solved
- Customer segmentation and targeting
- Risk assessment and prediction
- Revenue/sales forecasting

### Suitable For
- Data Analyst (E-commerce/Retail)
- Data Scientist (Financial Services)
- Business Analyst (Consumer Insights)

---
*Generated by Alysa Bot*" \
              --base main \
              --head master \
              --draft
          else
            echo "PR already exists"
          fi
