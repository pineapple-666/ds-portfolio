name: Auto Portfolio Update

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  run-my-robot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master  # 先拉取 master 分支
          token: ${{ secrets.GH_PAT }}  # 用你的 PAT 认证

      - name: 运行你的机器人脚本（这里替换成你真实的命令）
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          # 示例：如果你的机器人是 Python 脚本
          # python your_bot_script.py
          # 先创建测试文件，模拟机器人产出
          echo "Updated content from bot" > portfolio_data.json

      - name: 提交到 master 分支
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add portfolio_data.json  # 替换成你真实要提交的文件
          git commit -m "Auto-update portfolio content"
          git push origin master

      - name: 创建 PR 从 master 到 main
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}  # 用 PAT 创建 PR
        run: |
          gh pr create \
            --title "Auto: Portfolio Update" \
            --body "This PR was auto-generated by your bot. Please review and merge to main." \
            --base main \
            --head master \
            --draft
